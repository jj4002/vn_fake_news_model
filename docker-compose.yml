version: '3.8'

services:
  backend:
    build: .
    container_name: vn-fake-news-backend
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - MODEL_PATH=./models/phobert_fakenews_int8.onnx
      - TOKENIZER_PATH=./models/tokenizer
    volumes:
      - ./models:/app/models
      - ./temp:/app/temp
    restart: unless-stopped
